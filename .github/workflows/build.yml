name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the exe to a Release on tag pushes

jobs:
  build:
    # WinForms (net8.0-windows) can only be built on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish (self-contained single-file win-x64)
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BigPictureAudioSwitcher-win-x64
          path: publish/BigPictureAudioSwitcher.exe
          if-no-files-found: error

      # On a version tag (v1.2.3), attach the exe to a GitHub Release.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/BigPictureAudioSwitcher.exe
          generate_release_notes: true
